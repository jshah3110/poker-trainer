<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#0f3d1e"/>
  <!-- Card shape -->
  <rect x="44" y="28" width="104" height="136" rx="12" fill="#f5f5f0" stroke="#d1d1c8" stroke-width="2"/>
  <!-- Spade suit -->
  <text x="96" y="105" font-family="serif" font-size="72" text-anchor="middle" fill="#1a1a1a">♠</text>
  <!-- A top-left -->
  <text x="56" y="60" font-family="serif" font-size="28" font-weight="bold" fill="#1a1a1a">A</text>
  <!-- A bottom-right (rotated) -->
  <text x="136" y="148" font-family="serif" font-size="28" font-weight="bold" fill="#1a1a1a" text-anchor="middle" transform="rotate(180,136,140)">A</text>
</svg>
