<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0f3d1e"/>
  <!-- Card shape -->
  <rect x="116" y="72" width="280" height="368" rx="28" fill="#f5f5f0" stroke="#d1d1c8" stroke-width="4"/>
  <!-- Spade suit -->
  <text x="256" y="290" font-family="serif" font-size="190" text-anchor="middle" fill="#1a1a1a">♠</text>
  <!-- A top-left -->
  <text x="148" y="158" font-family="serif" font-size="72" font-weight="bold" fill="#1a1a1a">A</text>
  <!-- A bottom-right -->
  <text x="364" y="402" font-family="serif" font-size="72" font-weight="bold" fill="#1a1a1a" text-anchor="middle" transform="rotate(180,364,380)">A</text>
</svg>
